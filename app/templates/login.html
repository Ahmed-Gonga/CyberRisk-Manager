{% extends "base.html" %}{% block content %}
<div class="row justify-content-center"><div class="col-md-5"><div class="card shadow-sm mt-5"><div class="card-body p-4">
<h1 class="h3 mb-3">Login</h1><p class="text-muted">Use the demo credentials to access the risk dashboard.</p>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post" action="/login"><div class="mb-3"><label class="form-label">Username</label><input name="username" class="form-control" required></div><div class="mb-3"><label class="form-label">Password</label><input name="password" type="password" class="form-control" required></div><button class="btn btn-primary w-100">Login</button></form>
<div class="small text-muted mt-3">Demo: admin / admin123</div>
</div></div></div></div>
{% endblock %}
