{% extends "base.html" %}{% block content %}
<h1 class="h2">{{ 'Edit' if finding else 'New' }} Audit Finding</h1>
<form method="post" class="card card-body shadow-sm"><div class="row g-3">
  <div class="col-md-3"><label class="form-label">Finding ID</label><input name="finding_id" class="form-control" value="{{ finding.finding_id if finding else '' }}" placeholder="FIND-004" required></div>
  <div class="col-md-3"><label class="form-label">Risk Rating</label><select name="risk_rating" class="form-select">{% for r in ratings %}<option {% if finding and finding.risk_rating==r %}selected{% endif %}>{{ r }}</option>{% endfor %}</select></div>
  <div class="col-md-3"><label class="form-label">Owner</label><input name="owner" class="form-control" value="{{ finding.owner if finding else '' }}"></div>
  <div class="col-md-3"><label class="form-label">Due Date</label><input name="due_date" type="date" class="form-control" value="{{ finding.due_date if finding and finding.due_date else '' }}"></div>
  <div class="col-md-4"><label class="form-label">Status</label><select name="status" class="form-select">{% for s in statuses %}<option {% if finding and finding.status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
  <div class="col-md-8"><label class="form-label">Related Risk</label><select name="risk_id" class="form-select"><option value="">General</option>{% for r in risks %}<option value="{{ r.id }}" {% if finding and finding.risk_id==r.id %}selected{% endif %}>{{ r.title }}</option>{% endfor %}</select></div>
  <div class="col-12"><label class="form-label">Observation</label><textarea name="observation" class="form-control" rows="3" required>{{ finding.observation if finding else '' }}</textarea></div>
  <div class="col-12"><label class="form-label">Recommendation</label><textarea name="recommendation" class="form-control" rows="3">{{ finding.recommendation if finding else '' }}</textarea></div>
</div><div class="mt-3"><button class="btn btn-primary">Save</button><a href="/findings" class="btn btn-link">Cancel</a></div></form>
{% endblock %}
