{% extends "base.html" %}{% block content %}
<h1 class="h2">{{ 'Edit' if asset else 'New' }} Asset</h1><form method="post" class="card card-body shadow-sm">
<div class="row g-3"><div class="col-md-6"><label class="form-label">Name</label><input name="name" class="form-control" value="{{ asset.name if asset else '' }}" required minlength="2"></div><div class="col-md-6"><label class="form-label">Asset Type</label><input name="asset_type" class="form-control" value="{{ asset.asset_type if asset else '' }}" required></div><div class="col-md-6"><label class="form-label">Owner</label><input name="owner" class="form-control" value="{{ asset.owner if asset else '' }}" required></div><div class="col-md-3"><label class="form-label">Criticality</label><select name="criticality" class="form-select">{% for c in criticalities %}<option {% if asset and asset.criticality==c %}selected{% endif %}>{{ c }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label">Location</label><input name="location" class="form-control" value="{{ asset.location if asset else '' }}"></div><div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control">{{ asset.description if asset else '' }}</textarea></div></div><div class="mt-3"><button class="btn btn-primary">Save</button><a href="/assets" class="btn btn-link">Cancel</a></div></form>
{% endblock %}
