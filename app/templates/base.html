<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CyberRisk Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/dashboard">CyberRisk Manager</a>
    {% if user %}
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="nav">
      <div class="navbar-nav me-auto">
        <a class="nav-link" href="/assets">Assets</a>
        <a class="nav-link" href="/risks">Risks</a>
        <a class="nav-link" href="/controls">Controls</a>
        <a class="nav-link" href="/findings">Audit Findings</a>
        {% if can_view_audit_logs %}<a class="nav-link" href="/audit-logs">Audit Logs</a>{% endif %}
        {% if can_view_users %}<a class="nav-link" href="/users">Users</a>{% endif %}
      </div>
      <span class="text-light small me-3">{{ user }} · {{ role }}</span>
      <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
    </div>
    {% endif %}
  </div>
</nav>
<main class="container-fluid container-xl py-4">{% block content %}{% endblock %}</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body></html>
