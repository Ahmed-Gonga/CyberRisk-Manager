{% extends "base.html" %}{% block content %}
<h1 class="h2">{{ 'Edit' if control else 'New' }} Control</h1>
<form method="post" class="card card-body shadow-sm"><div class="row g-3">
  <div class="col-md-6"><label class="form-label">Name</label><input name="name" class="form-control" value="{{ control.name if control else '' }}" required></div>
  <div class="col-md-6"><label class="form-label">Framework Reference</label><input name="framework_reference" class="form-control" value="{{ control.framework_reference if control else '' }}"></div>
  <div class="col-md-3"><label class="form-label">ISO 27001 Reference</label><input name="iso27001_reference" class="form-control" value="{{ control.iso27001_reference if control else '' }}" placeholder="A.5.17"></div>
  <div class="col-md-3"><label class="form-label">NIST CSF</label><input name="nist_csf_function" class="form-control" value="{{ control.nist_csf_function if control else '' }}" placeholder="PR.AC"></div>
  <div class="col-md-3"><label class="form-label">Implementation Status</label><select name="implementation_status" class="form-select">{% for s in statuses %}<option {% if control and control.implementation_status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
  <div class="col-md-3"><label class="form-label">Owner</label><input name="owner" class="form-control" value="{{ control.owner if control else '' }}"></div>
  <div class="col-md-6"><label class="form-label">Related Risk</label><select name="risk_id" class="form-select"><option value="">General</option>{% for r in risks %}<option value="{{ r.id }}" {% if control and control.risk_id==r.id %}selected{% endif %}>{{ r.title }}</option>{% endfor %}</select></div>
  <div class="col-md-6"><label class="form-label">Evidence Link</label><input name="evidence_link" class="form-control" value="{{ control.evidence_link if control else '' }}"></div>
  <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3">{{ control.description if control else '' }}</textarea></div>
</div><div class="mt-3"><button class="btn btn-primary">Save</button><a href="/controls" class="btn btn-link">Cancel</a></div></form>
{% endblock %}
